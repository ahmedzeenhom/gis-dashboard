<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Unbreakable GIS UI v1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
margin:0;
height:100%;
font-family:system-ui;
overflow:hidden;
background:#050814;
}

/* SIDEBAR */
#sidebar{
position:absolute;
left:0;
top:0;
width:380px;
height:100%;
background:linear-gradient(180deg,#070b18,#0b1220);
color:#e5e7eb;
padding:14px;
overflow:auto;
border-right:2px solid rgba(56,189,248,0.25);
z-index:1000;
}

/* MAP */
#map{
position:absolute;
left:380px;
top:0;
right:0;
bottom:0;
}

/* PROJECT TITLE */
#projectTitle{
position:absolute;
top:10px;
left:400px;
z-index:99999;
background:#020617;
color:#38bdf8;
padding:10px 14px;
border-left:4px solid #38bdf8;
border-radius:10px;
font-weight:800;
}

/* BRAND (LOCKED) */
#brandBox{
position:fixed;
right:12px;
bottom:12px;
z-index:99999;
background:#020617;
color:#fff;
border:1px solid #38bdf8;
padding:10px;
border-radius:10px;
font-size:12px;
}

/* UI BLOCKS */
.section-header{
margin-top:12px;
padding:10px;
background:rgba(255,255,255,0.04);
border-radius:10px;
border:1px solid rgba(255,255,255,0.06);
}

.section-header h3{
margin:0;
font-size:13px;
color:#38bdf8;
}

.section-content{
padding:10px;
margin-top:6px;
background:rgba(255,255,255,0.02);
border-radius:10px;
border:1px solid rgba(255,255,255,0.05);
}

/* INPUTS */
select,input{
width:100%;
padding:10px;
margin-top:6px;
background:#0b1220;
color:#fff;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
}

/* LAYERS FIX */
.leaflet-control{
z-index:99999 !important;
}

.leaflet-top.leaflet-right{
z-index:99999 !important;
}

</style>
</head>

<body>

<!-- TITLE -->
<div id="projectTitle">مشروع الخفجي GIS</div>

<!-- BRAND (UNBREAKABLE) -->
<div id="brandBox">AHMED ZEEN<br>GIS SPECIALIST</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAP -->
<div id="map"></div>

<script>

/* ================= MAP ================= */
const map = L.map('map').setView([28.4,48.5],13);

const imagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

/* ================= DATA ================= */
let K=[],N=[],P=[],E=[];

/* ================= LAYERS ================= */
let landLayer=L.geoJSON(null).addTo(map);
let networkLayer=L.geoJSON(null,{style:{color:"#ff0000",weight:2}}).addTo(map);
let pressureLayer=L.geoJSON(null,{style:{color:"#000",weight:2}}).addTo(map);
let electricLayer=L.geoJSON(null).addTo(map);

/* ================= COLORS ================= */
function color(v){
v=String(v||"");
if(v.includes("سكني")) return "#facc15";
if(v.includes("تجاري")) return "#ef4444";
if(v.includes("صناعي")) return "#a855f7";
if(v.includes("خدمات")) return "#38bdf8";
if(v.includes("المرافق")) return "#22c55e";
return "#64748b";
}

/* ================= ELECTRIC ICON ================= */
function pin(status){
let ok=String(status)==="1";
let c=ok?"#00ff6a":"#ff1744";

return L.divIcon({
html:`
<div style="position:relative">
<div style="
width:56px;height:56px;
background:${c};
border-radius:50% 50% 50% 0;
transform:rotate(-45deg);
border:5px solid white;
box-shadow:0 10px 20px rgba(0,0,0,0.6);
"></div>
<div style="
position:absolute;
top:20px;left:20px;
width:14px;height:14px;
background:white;
border-radius:50%;
"></div>
</div>
`,
iconSize:[56,56],
iconAnchor:[28,56]
});
}

/* ================= SAFE RENDER ================= */
function renderLand(data){
landLayer.clearLayers();
landLayer.addData({
type:"FeatureCollection",
features:data
}).setStyle(f=>({
fillColor:color(f.properties.USE),
color:"#111",
weight:1,
fillOpacity:0.6
}));
}

/* ================= UNBREAKABLE UI BUILDER ================= */
function buildUI(){

document.getElementById("sidebar").innerHTML = `

<div class="section-header">
<h3>استخدامات الاراضي</h3>
<select id="useFilter" onchange="filterUSE()">
<option value="all">All</option>
<option>سكني</option>
<option>تجاري</option>
<option>صناعي</option>
<option>خدمات</option>
<option>المرافق</option>
</select>
</div>

<div class="section-header">
<h3>الشبكات</h3>
<select id="networkFilter" onchange="filterNetwork(this.value)">
<option value="all">All</option>
</select>
</div>

<div class="section-header">
<h3>خطوط الطرد</h3>
<select id="pressureFilter" onchange="filterPressure(this.value)">
<option value="all">All</option>
</select>
</div>

<div class="section-header">
<h3>محطات الرفع</h3>
<select id="electricFilter" onchange="filterElectric(this.value)">
<option value="all">All</option>
<option value="1">🟢 قائمة</option>
<option value="3">🔴 مقترحة</option>
</select>
</div>

<div class="section-header">
<h3>السطوع والتباين</h3>
<input type="range" id="b" min="50" max="150" value="100">
<input type="range" id="c" min="50" max="150" value="100">
</div>

`;
}

/* ================= SAFE FILTERS ================= */
function filterUSE(){
let v=useFilter.value;
renderLand(v==="all"?K:K.filter(x=>String(x.properties.USE).includes(v)));
}

function filterNetwork(v){
networkLayer.clearLayers();
networkLayer.addData({
type:"FeatureCollection",
features: v==="all"?N:N.filter(x=>String(x.properties.NO)==v)
});
}

function filterPressure(v){
pressureLayer.clearLayers();
pressureLayer.addData({
type:"FeatureCollection",
features: v==="all"?P:P.filter(x=>String(x.properties.des)==v)
});
}

function filterElectric(v){
electricLayer.clearLayers();
electricLayer.addData({
type:"FeatureCollection",
features: v==="all"?E:E.filter(x=>String(x.properties.StructureStatus)==v)
});
}

/* ================= DROPDOWN AUTO FIX ================= */
function buildDropdowns(){

networkFilter.innerHTML=`<option value="all">All</option>`;
[...new Set(N.map(x=>x.properties.NO))].forEach(v=>{
networkFilter.innerHTML+=`<option value="${v}">${v}</option>`;
});

pressureFilter.innerHTML=`<option value="all">All</option>`;
[...new Set(P.map(x=>x.properties.des))].forEach(v=>{
pressureFilter.innerHTML+=`<option value="${v}">${v}</option>`;
});
}

/* ================= BRIGHTNESS SAFE ================= */
function bindBrightness(){

function update(){
document.querySelector(".leaflet-tile-pane").style.filter=
`brightness(${b.value}%) contrast(${c.value}%)`;
}

b.oninput=update;
c.oninput=update;
}

/* ================= LOAD DATA ================= */
fetch('data/alkhafje.geojson')
.then(r=>r.json())
.then(d=>{
K=d.features;
renderLand(K);
map.fitBounds(landLayer.getBounds());
});

fetch('data/alkhafje-network.json')
.then(r=>r.json())
.then(d=>{
N=d.features;
networkLayer.addData(d);
buildDropdowns();
});

fetch('data/pressure_line.geojson')
.then(r=>r.json())
.then(d=>{
P=d.features;
pressureLayer.addData(d);
buildDropdowns();
});

fetch('data/electric.geojson')
.then(r=>r.json())
.then(d=>{
E=d.features;
electricLayer.addData({
type:"FeatureCollection",
features:E
});
});

/* ================= LAYERS CONTROL (UNBREAKABLE) ================= */
function initLayers(){
setTimeout(()=>{
L.control.layers(
{"Imagery":imagery},
{
"Land Use":landLayer,
"Networks":networkLayer,
"Pressure":pressureLayer,
"Electric":electricLayer
},
{collapsed:false,position:"topright"}
).addTo(map);
},800);
}

/* ================= BOOT SYSTEM ================= */
function boot(){
buildUI();
bindBrightness();
initLayers();
}

boot();

</script>

</body>
</html>
