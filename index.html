<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIS Stable Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#brandBox{
position:fixed;
right:10px;
bottom:10px;
background:rgba(15,23,42,0.9);
color:#fff;
padding:10px 12px;
border-radius:10px;
z-index:999999;
border:1px solid #38bdf8;
font-size:12px;
line-height:1.4;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
html,body{
margin:0;height:100%;
font-family:Arial;
overflow:hidden;
}

/* ================= LOADER ================= */
#loader{
position:fixed;
width:100%;
height:100%;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
flex-direction:column;
}
.loader-title{
color:#38bdf8;
font-size:28px;
font-weight:bold;
}
.loader-sub{
color:#fff;
font-size:14px;
margin-top:6px;
}

/* ================= SIDEBAR ================= */
#sidebar{
position:absolute;
left:0;top:0;
width:340px;height:100%;
background:#0f172a;
color:#fff;
padding:12px;
overflow:auto;
z-index:1000;
}

/* ================= PROJECT TITLE (NEW - SAFE ADDITION) ================= */
#projectTitle{
font-size:16px;
font-weight:800;
color:#38bdf8;
margin-bottom:18px;
line-height:1.6;
text-shadow:0 0 10px rgba(56,189,248,0.4);
padding:8px 6px;
border-left:4px solid #38bdf8;
}

/* ================= MAP ================= */
#map{
position:absolute;
left:340px;
top:0;
right:0;
bottom:0;
}

/* ================= BRAND ================= */
.brand{
position:fixed;
right:10px;
bottom:35px;
background:#0f172a;
color:#fff;
padding:10px;
border-radius:10px;
z-index:9999;
border:1px solid #38bdf8;
font-size:12px;
}

/* ================= LEGEND ================= */
.legend{
position:absolute;
bottom:10px;
left:350px;
background:#fff;
padding:10px;
border-radius:8px;
font-size:12px;
z-index:9999;
}

/* ================= LAYER CONTROL FIX ================= */
.leaflet-top,
.leaflet-right{
z-index:99999 !important;
}

/* ================= INPUT FIX ================= */
select,input{
width:100%;
padding:10px;
margin:8px 0;
font-size:14px;
border-radius:6px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-title">AHMED ZEEN</div>
<div class="loader-sub">GIS SPECIALIST</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">

<!-- PROJECT TITLE (SAFE ADDITION ABOVE LAND USE) -->
<div id="projectTitle">
🌍 مشروع الدراسات والتصاميم  بمحافظة الخفجي
</div>

<h3>استخدامات الأراضي</h3>
<select id="useFilter" onchange="filterUSE()">
<option value="all">All</option>
<option>سكني</option>
<option>تجاري</option>
<option>صناعي</option>
<option>خدمات</option>
<option>المرافق</option>
</select>

<h3>الشبكات</h3>
<select id="networkFilter" onchange="filterNetwork(this.value)">
<option value="all">All</option>
</select>

<h3>خطوط الطرد</h3>
<select id="pressureFilter" onchange="filterPressure(this.value)">
<option value="all">All</option>
</select>

<hr>

<h3>Brightness</h3>
<input type="range" id="b" min="50" max="150" value="100">

<h3>Contrast</h3>
<input type="range" id="c" min="50" max="150" value="100">

</div>

<div id="map"></div>

<div class="legend" id="legend"></div>

<script>

/* ================= MAP ================= */
const map = L.map('map').setView([28.4,48.5],13);

/* BASEMAP */
const imagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

/* DATA */
let K=[],N=[],P=[];

/* COLORS */
function getColor(v){
if(!v) return "#999";
if(v.includes("سكني")) return "#f1c40f";
if(v.includes("تجاري")) return "#e74c3c";
if(v.includes("صناعي")) return "#9b59b6";
if(v.includes("خدمات")) return "#3498db";
if(v.includes("المرافق")) return "#2c3e50";
return "#95a5a6";
}

/* LAND LAYER */
let landLayer = L.geoJSON(null,{
style:f=>({
fillColor:getColor(f.properties.USE),
color:"#000",
weight:1,
fillOpacity:0.6
})
}).addTo(map);

/* NETWORK */
let networkLayer = L.geoJSON(null,{style:{color:"red"}}).addTo(map);

/* PRESSURE */
let pressureLayer = L.geoJSON(null,{style:{color:"black"}}).addTo(map);

/* LOAD DATA */
fetch('data/alkhafje.geojson').then(r=>r.json()).then(d=>{
K=d.features;
landLayer.addData(d);
map.fitBounds(landLayer.getBounds());
buildLegend();
});

fetch('data/alkhafje-network.json').then(r=>r.json()).then(d=>{
N=d.features;
networkLayer.addData(d);
buildNetwork();
});

fetch('data/pressure_line.geojson').then(r=>r.json()).then(d=>{
P=d.features;
pressureLayer.addData(d);
buildPressure();
});

/* CONTROL */
L.control.layers(
{
"🛰 Imagery":imagery
},
{
"📐 Land Use":landLayer,
"🔌 Network":networkLayer,
"🚰 Pressure":pressureLayer
},
{collapsed:false,position:"topright"}
).addTo(map);

/* FILTERS */
function filterUSE(){
let v=useFilter.value;
landLayer.clearLayers();
landLayer.addData({
type:"FeatureCollection",
features:v==="all"?K:K.filter(x=>x.properties.USE?.includes(v))
});
buildLegend();
}

function filterNetwork(v){
networkLayer.clearLayers();
networkLayer.addData({
type:"FeatureCollection",
features:v==="all"?N:N.filter(x=>String(x.properties.NO)==v)
});
}

function filterPressure(v){
pressureLayer.clearLayers();
pressureLayer.addData({
type:"FeatureCollection",
features:v==="all"?P:P.filter(x=>String(x.properties.des)==v)
});
}

/* DROPDOWNS */
function buildNetwork(){
networkFilter.innerHTML="<option value='all'>All</option>";
[...new Set(N.map(x=>x.properties.NO))].forEach(v=>{
networkFilter.innerHTML+=`<option>${v}</option>`;
});
}

function buildPressure(){
pressureFilter.innerHTML="<option value='all'>All</option>";
[...new Set(P.map(x=>x.properties.des))].forEach(v=>{
pressureFilter.innerHTML+=`<option>${v}</option>`;
});
}

/* LEGEND */
function buildLegend(){
let el=document.getElementById("legend");
el.innerHTML="<b>Land Use</b><br>";
[...new Set(K.map(x=>x.properties.USE))].forEach(t=>{
el.innerHTML+=`
<div>
<span style="background:${getColor(t)};width:12px;height:12px;display:inline-block;margin-right:5px"></span>
${t}
</div>`;
});
}

/* BRIGHTNESS / CONTRAST */
b.oninput=c.oninput=()=>{
document.querySelector(".leaflet-tile-pane").style.filter=
`brightness(${b.value}%) contrast(${c.value}%)`;
};

/* LOADER */
window.onload=()=>{
setTimeout(()=>{
loader.style.display="none";
},3000);
};

</script>
<div id="brandBox">
  AHMED ZEEN<br>
  <small>GIS SPECIALIST</small>
</div>
</body>
</html>
