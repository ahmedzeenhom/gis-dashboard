<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIS Dashboard Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
  overflow:hidden;
}

/* ================= SIDEBAR ================= */
#sidebar{
  position:absolute;
  left:0;top:0;
  width:340px;height:100%;

  background:rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  color:#fff;
  padding:12px;
  overflow:auto;
  z-index:1000;

  border-right:1px solid rgba(255,255,255,0.08);
  transition:0.3s ease;
}

/* ================= MAP ================= */
#map{
  position:absolute;
  left:340px;
  top:15px;
  right:0;
  bottom:0;
  transition:0.3s ease;
}

/* ================= TOGGLE ================= */
#toggleBtn{
  position:absolute;
  top:10px;
  left:350px;
  z-index:2000;

  background:rgba(56,189,248,0.2);
  border:1px solid rgba(56,189,248,0.4);
  color:#38bdf8;

  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;

  backdrop-filter: blur(10px);
}

/* ================= HEADER ================= */
#headerBox{
  margin-bottom:10px;
  background:rgba(56,189,248,0.08);
  border:1px solid rgba(56,189,248,0.3);
  border-radius:10px;
}

#headerTitle{
  padding:10px;
  cursor:pointer;
  font-weight:bold;
  color:#38bdf8;
  display:flex;
  justify-content:space-between;
}

#headerContent{padding:10px;}

.mainTitle{font-size:13px;line-height:1.4;}
.subTitle{font-size:11px;color:#94a3b8;margin-top:5px;}

select,input{width:100%;margin:6px 0;}

/* ================= BRAND ================= */
#credit{
  position:fixed;
  bottom:2px;
  right:1px;
  z-index:9999;

  background:rgba(15,23,42,0.75);
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(56,189,248,0.4);
}

.brand-name{
  color:#38bdf8;
  font-weight:bold;
  text-shadow:0 0 10px #38bdf8;
}

.brand-title{
  color:#fff;
  font-size:12px;
}

/* ================= FIX: LAYERS CONTROL ================= */
.leaflet-top,
.leaflet-right{
  z-index:99999 !important;
}

.leaflet-control-layers{
  display:block !important;
  opacity:1 !important;
}
</style>
</head>

<body>

<div id="toggleBtn" onclick="toggleSidebar()">☰</div>

<div id="sidebar">

<div id="headerBox">
  <div id="headerTitle" onclick="toggleHeader()">
    🌍 مشروع درء أخطار السيول بمحافظة الخفجي
    <span id="arrow">▼</span>
  </div>

  <div id="headerContent">
    <div class="mainTitle">
      مشروع دراسات وتصاميم وتخفيض منسوب المياه السطحية ودرء أخطار السيول بمحافظة الخفجي
    </div>
    <div class="subTitle">GIS Web Dashboard</div>
  </div>
</div>

<hr>

<h3>استخدامات الأراضي</h3>
<select id="useFilter" onchange="filterUSE()">
  <option value="all">All</option>
  <option value="سكني">سكني</option>
  <option value="تجاري">تجاري</option>
  <option value="صناعي">صناعي</option>
  <option value="خدمات">خدمات</option>
  <option value="المرافق">المرافق</option>
</select>

<h3>الشبكات</h3>
<select>
  <option>All</option>
  <option>1</option>
  <option>2</option>
</select>

<h3>خطوط الطرد</h3>
<select>
  <option>All</option>
  <option>1</option>
  <option>2</option>
</select>

<hr>

<h3>الصورة الجوية</h3>
Brightness
<input type="range" id="brightness" min="50" max="150" value="100">
Contrast
<input type="range" id="contrast" min="50" max="150" value="100">

</div>

<div id="map"></div>

<div id="credit">
  <div class="brand-name">AHMED ZEEN</div>
  <div class="brand-title">GIS SPECIALIST</div>
</div>

<script>

try {

// ================= MAP =================
const map = L.map('map').setView([28.4, 48.5], 13);

// ================= BASEMAPS =================
const imagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

const street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

// ================= COLORS =================
function getUSEColor(u){
  if(!u) return "#999";
  if(u.includes("سكني")) return "#f1c40f";
  if(u.includes("تجاري")) return "#e74c3c";
  if(u.includes("صناعي")) return "#9b59b6";
  if(u.includes("خدمات")) return "#3498db";
  if(u.includes("المرافق")) return "#2c3e50";
  return "#95a5a6";
}

// ================= LAYERS =================
let khafjiLayer = L.geoJSON(null,{
  style:f=>({
    fillColor:getUSEColor(f.properties?.USE),
    color:"#000",
    weight:1,
    fillOpacity:0.65
  })
}).addTo(map);

let networkLayer = L.geoJSON(null,{
  style:{color:"#8B0000",weight:2}
}).addTo(map);

let pressureLayer = L.geoJSON(null,{
  style:{color:"#000",weight:3}
}).addTo(map);

// ================= STORE =================
window._khafjiOriginal = [];

// ================= LOAD DATA =================
fetch('data/alkhafje.geojson')
.then(r=>r.json())
.then(d=>{

  khafjiLayer.addData(d);
  window._khafjiOriginal = d.features;

  const bounds = khafjiLayer.getBounds();
  if(bounds.isValid()){
    map.fitBounds(bounds,{
      padding:[40,40],
      maxZoom:14
    });
  }

});

// ================= NETWORK =================
fetch('data/alkhafje-network.json')
.then(r=>r.json())
.then(d=>networkLayer.addData(d));

// ================= PRESSURE =================
fetch('data/pressure_line.geojson')
.then(r=>r.json())
.then(d=>pressureLayer.addData(d));

// ================= FIX: LAYERS CONTROL (IMPORTANT) =================
setTimeout(()=>{

L.control.layers(
{
  "🛰 Imagery": imagery,
  "🗺 Street": street
},
{
  "📐 المخطط الإرشادي": khafjiLayer,
  "🔌 الشبكات": networkLayer,
  "🚰 خطوط الطرد": pressureLayer
},
{
  collapsed:false,
  position:"topright"
}
).addTo(map);

map.invalidateSize();

},500);

// ================= FILTER =================
window.filterUSE = function(){

  const v = document.getElementById("useFilter").value;

  khafjiLayer.clearLayers();

  const filtered = (v==="all")
    ? window._khafjiOriginal
    : window._khafjiOriginal.filter(f =>
        (f.properties?.USE || "").includes(v)
      );

  khafjiLayer.addData({
    type:"FeatureCollection",
    features:filtered
  });

};

// ================= BRIGHTNESS =================
function updateImagery(){
let b=document.getElementById("brightness").value;
let c=document.getElementById("contrast").value;

document.querySelector(".leaflet-tile-pane").style.filter=
`brightness(${b}%) contrast(${c}%)`;
}

document.getElementById("brightness").oninput=updateImagery;
document.getElementById("contrast").oninput=updateImagery;

// ================= UI =================
window.toggleHeader=function(){
let el=document.getElementById("headerContent");
let a=document.getElementById("arrow");

if(el.style.display==="none"){
el.style.display="block";a.innerHTML="▼";
}else{
el.style.display="none";a.innerHTML="▲";
}
}

window.toggleSidebar=function(){
const sidebar=document.getElementById("sidebar");
const mapDiv=document.getElementById("map");

if(sidebar.style.display==="none"){
sidebar.style.display="block";
mapDiv.style.left="340px";
}else{
sidebar.style.display="none";
mapDiv.style.left="0px";
}
}

} catch(e){
console.log(e);
}

</script>

</body>
</html>
