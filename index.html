<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIS Dashboard Pro Final</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial;
  overflow:hidden;
}

/* SIDEBAR */
#sidebar{
  position:absolute;
  left:0;top:0;
  width:340px;height:100%;
  background:rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(14px);
  color:#fff;
  padding:12px;
  overflow:auto;
  z-index:1000;
}

/* MAP */
#map{
  position:absolute;
  left:340px;
  top:0;
  right:0;
  bottom:0;
}

/* HEADER */
#headerBox{
  margin-bottom:10px;
  background:rgba(56,189,248,0.08);
  border:1px solid rgba(56,189,248,0.3);
  border-radius:10px;
}

#headerTitle{
  padding:10px;
  font-weight:bold;
  color:#38bdf8;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

#headerContent{padding:10px;font-size:13px;}

select,input{
  width:100%;
  margin:6px 0;
}

/* LEAFLET CONTROL FIX */
.leaflet-top,
.leaflet-right{
  z-index:99999 !important;
}

/* CREDIT */
#credit{
  position:fixed;
  bottom:2px;
  right:1px;
  z-index:9999;
  background:rgba(15,23,42,0.75);
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(56,189,248,0.4);
}

.brand-name{
  color:#38bdf8;
  font-weight:bold;
}

.brand-title{
  color:#fff;
  font-size:12px;
}
</style>
</head>

<body>

<div id="sidebar">

<div id="headerBox">
  <div id="headerTitle">
    🌍 مشروع درء أخطار السيول - الخفجي
  </div>
  <div id="headerContent">
    GIS Dashboard Professional
  </div>
</div>

<hr>

<h3>استخدامات الأراضي</h3>
<select id="useFilter" onchange="filterUSE()">
  <option value="all">All</option>
  <option value="سكني">سكني</option>
  <option value="تجاري">تجاري</option>
  <option value="صناعي">صناعي</option>
  <option value="خدمات">خدمات</option>
  <option value="المرافق">المرافق</option>
</select>

<h3>الشبكات</h3>
<select id="networkFilter" onchange="filterNetwork(this.value)">
  <option value="all">All</option>
</select>

<h3>خطوط الطرد</h3>
<select id="pressureFilter" onchange="filterPressure(this.value)">
  <option value="all">All</option>
</select>

<hr>

<h3>الصورة الجوية</h3>

Brightness
<input type="range" id="brightness" min="50" max="150" value="100">

Contrast
<input type="range" id="contrast" min="50" max="150" value="100">

</div>

<div id="map"></div>

<div id="credit">
  <div class="brand-name">AHMED ZEEN</div>
  <div class="brand-title">GIS SPECIALIST</div>
</div>

<script>

// ================= MAP =================
const map = L.map('map').setView([28.4, 48.5], 13);

// BASEMAP
const imagery = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

const street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

// ================= DATA =================
window._khafji = [];
window._network = [];
window._pressure = [];

// ================= LAYERS =================
let khafjiLayer = L.geoJSON(null,{
  style:f=>({
    fillColor:getColor(f.properties?.USE),
    color:"#000",
    weight:1,
    fillOpacity:0.6
  })
}).addTo(map);

let networkLayer = L.geoJSON(null,{
  style:{color:"#8B0000",weight:2}
}).addTo(map);

let pressureLayer = L.geoJSON(null,{
  style:{color:"#000",weight:2}
}).addTo(map);

// ================= COLOR =================
function getColor(v){
  switch((v||"").trim()){
    case "سكني": return "#f1c40f";
    case "تجاري": return "#e74c3c";
    case "صناعي": return "#9b59b6";
    case "خدمات": return "#3498db";
    case "المرافق": return "#2c3e50";
    default: return "#95a5a6";
  }
}

// ================= UNIQUE =================
function unique(data,key){
  return [...new Set(
    data.map(f=>f.properties?.[key]).filter(Boolean)
  )].sort((a,b)=>a-b);
}

// ================= LOAD =================
fetch('data/alkhafje.geojson')
.then(r=>r.json())
.then(d=>{
  window._khafji = d.features;
  khafjiLayer.addData(d);
  map.fitBounds(khafjiLayer.getBounds());
});

fetch('data/alkhafje-network.json')
.then(r=>r.json())
.then(d=>{
  window._network = d.features;
  networkLayer.addData(d);
  buildNetwork();
});

fetch('data/pressure_line.geojson')
.then(r=>r.json())
.then(d=>{
  window._pressure = d.features;
  pressureLayer.addData(d);
  buildPressure();
});

// ================= BUILD DROPDOWNS =================
function buildNetwork(){
  let sel=document.getElementById("networkFilter");
  sel.innerHTML=`<option value="all">All</option>`;
  unique(window._network,"NO").forEach(v=>{
    sel.innerHTML+=`<option value="${v}">${v}</option>`;
  });
}

function buildPressure(){
  let sel=document.getElementById("pressureFilter");
  sel.innerHTML=`<option value="all">All</option>`;
  unique(window._pressure,"des").forEach(v=>{
    sel.innerHTML+=`<option value="${v}">${v}</option>`;
  });
}

// ================= FILTERS =================
function filterUSE(){
  let v=document.getElementById("useFilter").value;

  khafjiLayer.clearLayers();

  let f = (v==="all")
    ? window._khafji
    : window._khafji.filter(x=>
        (x.properties?.USE||"").includes(v)
      );

  khafjiLayer.addData({type:"FeatureCollection",features:f});
}

function filterNetwork(v){
  networkLayer.clearLayers();

  let f = (v==="all")
    ? window._network
    : window._network.filter(x=>
        String(x.properties?.NO).trim()===String(v).trim()
      );

  networkLayer.addData({type:"FeatureCollection",features:f});
}

function filterPressure(v){
  pressureLayer.clearLayers();

  let f = (v==="all")
    ? window._pressure
    : window._pressure.filter(x=>
        String(x.properties?.des).trim()===String(v).trim()
      );

  pressureLayer.addData({type:"FeatureCollection",features:f});
}

// ================= IMAGE CONTROL =================
function updateImg(){
let b=document.getElementById("brightness").value;
let c=document.getElementById("contrast").value;

document.querySelector(".leaflet-tile-pane").style.filter=
`brightness(${b}%) contrast(${c}%)`;
}

document.getElementById("brightness").oninput=updateImg;
document.getElementById("contrast").oninput=updateImg;

// ================= LAYER CONTROL =================
L.control.layers(
{
  "🛰 Imagery": imagery,
  "🗺 Street": street
},
{
  "📐 المخطط": khafjiLayer,
  "🔌 الشبكات": networkLayer,
  "🚰 خطوط الطرد": pressureLayer
},
{collapsed:false,position:"topright"}
).addTo(map);

</script>

</body>
</html>
